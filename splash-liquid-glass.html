<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      opacity: 0;
      animation: fadeIn 0.7s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    #dot-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; }
    .glass-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 44px 26px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.14);
      border-top: 1px solid rgba(255,255,255,0.24);
      box-shadow: 0 8px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .glass-card::before { content:''; position:absolute; top:8px; left:8px; width:14px; height:14px; border-top:1px solid rgba(244,162,30,0.65); border-left:1px solid rgba(244,162,30,0.65); }
    .glass-card::after  { content:''; position:absolute; bottom:8px; right:8px; width:14px; height:14px; border-bottom:1px solid rgba(244,162,30,0.65); border-right:1px solid rgba(244,162,30,0.65); }
    .corner-tr { position:absolute; top:8px; right:8px; width:14px; height:14px; border-top:1px solid rgba(244,162,30,0.65); border-right:1px solid rgba(244,162,30,0.65); }
    .corner-bl { position:absolute; bottom:8px; left:8px; width:14px; height:14px; border-bottom:1px solid rgba(244,162,30,0.65); border-left:1px solid rgba(244,162,30,0.65); }
    .emblem {
      width:64px; height:64px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:20px;
      animation: emblemPulse 2.4s ease-in-out infinite;
    }
    @keyframes emblemPulse {
      0%,100% { filter: drop-shadow(0 0 10px rgba(244,162,30,0.40)); }
      50%      { filter: drop-shadow(0 0 22px rgba(244,162,30,0.70)); }
    }
    .emblem img { width:64px; height:64px; object-fit:contain; }
    .title { font-size:1.75rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#fff; text-shadow:0 0 20px rgba(244,162,30,0.45); margin-bottom:4px; }
    .subtitle { font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase; color:rgba(255,255,255,0.40); margin-bottom:22px; }
    .divider { width:160px; height:1px; background:linear-gradient(90deg,transparent,rgba(244,162,30,0.55),transparent); margin-bottom:20px; }
    .author { font-size:0.95rem; font-weight:600; letter-spacing:0.10em; color:rgba(255,255,255,0.78); margin-bottom:5px; }
    .clan { font-size:0.65rem; letter-spacing:0.20em; text-transform:uppercase; color:rgba(255,255,255,0.32); }
    .theme-badge { margin-top:16px; padding:3px 12px; background:rgba(244,162,30,0.10); border:1px solid rgba(244,162,30,0.28); font-size:0.56rem; letter-spacing:0.22em; text-transform:uppercase; color:rgba(244,162,30,0.80); }
    .loading-bar { position:fixed; bottom:0; left:0; height:2px; background:linear-gradient(90deg,rgba(244,162,30,0.85),rgba(0,229,255,0.85)); box-shadow:0 0 8px rgba(244,162,30,0.55); animation:load 2.2s ease forwards; width:0%; z-index:2; }
    @keyframes load { to { width:100%; } }
  </style>
</head>
<body>
  <canvas id="dot-canvas"></canvas>
  <div class="glass-card">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="emblem">
      <img src="icon.png" alt="Division 2 Gear Calculator" />
    </div>
    <div class="title">Division 2</div>
    <div class="subtitle">Gear &amp; DPS Calculator v1.7.7</div>
    <div class="divider"></div>
    <div class="author">ImThatTeriyaki</div>
    <div class="clan">Sleepy Inc Clan</div>
    <div class="theme-badge">Liquid Glass</div>
  </div>
  <div class="loading-bar"></div>
  <script>
    const canvas = document.getElementById('dot-canvas');
    const ctx = canvas.getContext('2d');
    const ANGLE = 20 * Math.PI / 180;
    const SPEED = 0.05;
    const dx = Math.sin(ANGLE) * SPEED;
    const dy = -Math.cos(ANGLE) * SPEED;
    let W, H, dots;
    function makeDot() {
      const d = Math.random();
      return { x: Math.random()*W, y: Math.random()*H, size: 0.8+d*2.2, alpha: 0.25+d*0.65, glow: (0.8+d*2.2)*(3+d*6) };
    }
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      dots = [];
      const n = Math.floor((W*H)/28000);
      for (let i=0;i<n;i++) dots.push(makeDot());
    }
    function frame() {
      ctx.clearRect(0,0,W,H);
      for (const d of dots) {
        d.x+=dx; d.y+=dy;
        if (d.y+d.glow<0) { d.y=H+d.glow; d.x=Math.random()*W; }
        if (d.x-d.glow>W) { d.x=-d.glow; d.y=Math.random()*H; }
        ctx.beginPath(); ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(244,162,30,${d.alpha})`; ctx.fill();
        const g=ctx.createRadialGradient(d.x,d.y,d.size*0.5,d.x,d.y,d.glow);
        g.addColorStop(0,`rgba(244,162,30,${d.alpha*0.35})`);
        g.addColorStop(0.4,`rgba(244,162,30,${d.alpha*0.12})`);
        g.addColorStop(1,'rgba(244,162,30,0)');
        ctx.beginPath(); ctx.arc(d.x,d.y,d.glow,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      }
      requestAnimationFrame(frame);
    }
    window.addEventListener('resize', resize);
    resize(); frame();
  </script>
</body>
</html>
