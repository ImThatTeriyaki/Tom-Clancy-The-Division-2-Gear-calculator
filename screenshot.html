/* -- Layout -- */
.page{position:relative;z-index:1;width:1920px;padding:20px;display:flex;flex-direction:column;gap:12px;}

/* -- Header -- */
.ss-header{
  background:rgba(20,30,44,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(244,162,30,0.2);
  border-top:3px solid #d4a853;
  padding:16px 24px;
  display:flex;align-items:center;gap:16px;
}
.ss-header-name{font-size:28px;font-weight:700;color:#f2ead8;letter-spacing:0.1em;text-transform:uppercase;}
.ss-header-badge{
  padding:4px 14px;border:1px solid;border-radius:2px;
  font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
}
.ss-header-right{margin-left:auto;text-align:right;}
.ss-header-version{font-size:11px;color:#d4a853;letter-spacing:0.1em;}
.ss-header-date{font-size:10px;color:#8a9070;margin-top:2px;}

/* -- Section title -- */
.ss-section{
  background:rgba(20,30,44,0.60);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-left:4px solid #d4a853;
  padding:6px 14px;
  font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#d4a853;
  margin-bottom:4px;
}

/* -- Card grid -- */
.ss-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ss-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.ss-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}

/* -- Card -- */
.ss-card{
  background:rgba(22,24,32,0.55);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(212,168,83,0.15);
  border-top:3px solid #d4a853;
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.ss-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 60%);
  pointer-events:none;
}
.ss-card.rarity-exotic{border-top-color:#d47814;background:rgba(30,20,10,0.55);}
.ss-card.rarity-named{border-top-color:#d47814;background:rgba(28,18,8,0.55);}
.ss-card.rarity-high-end{border-top-color:#148cb4;background:rgba(8,20,30,0.55);}
.ss-card.rarity-gear-set{border-top-color:#643cb4;background:rgba(15,8,28,0.55);}
.ss-card.rarity-prototype{border-top-color:#a855f7;background:rgba(20,8,30,0.55);}

/* -- Card internals -- */
.ss-slot-label{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#8a9070;margin-bottom:6px;}
.ss-item-name{font-size:15px;font-weight:700;color:#f2ead8;margin-bottom:2px;line-height:1.2;}
.ss-item-quality{font-size:10px;color:#8a9070;margin-bottom:8px;}
.ss-divider{height:1px;background:rgba(212,168,83,0.12);margin:8px 0;}
.ss-subhdr{
  font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:#c07830;background:rgba(37,40,48,0.60);
  margin:8px -16px 10px;padding:5px 16px;
  border-left:3px solid #c07830;
}
.ss-kv{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px;}
.ss-kv-label{font-size:10px;color:#8a9070;text-transform:uppercase;letter-spacing:0.05em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ss-kv-val{font-size:11px;font-weight:700;color:#f2ead8;font-family:'Share Tech Mono',monospace;white-space:nowrap;flex-shrink:0;}
.ss-kv-val.accent{color:#d4a853;}
.ss-kv-val.cyan{color:#7aaa8e;}
.ss-kv-val.blue{color:#5ba8c4;}
.ss-talent-name{font-size:12px;font-weight:700;color:#7aaa8e;margin-bottom:3px;}
.ss-talent-desc{font-size:9px;color:#8a9070;line-height:1.5;}
.ss-farming{font-size:9px;color:#8a9070;font-style:italic;margin-top:6px;}
.ss-farming::before{content:'?? ';}
.ss-unequipped{font-size:13px;color:#8a9070;font-style:italic;padding:8px 0;}

/* -- DPS values -- */
.ss-dps-block{background:rgba(0,0,0,0.25);border-left:3px solid #d4a853;padding:8px 12px;margin-top:8px;}
.ss-dps-val{font-size:20px;font-weight:700;color:#d4a853;font-family:'Share Tech Mono',monospace;}
.ss-dps-label{font-size:9px;color:#8a9070;letter-spacing:0.1em;text-transform:uppercase;}
.ss-dps-sub{font-size:9px;color:#8a9070;margin-top:2px;}

/* -- Stat panel -- */
.ss-stat-section-title{
  font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:#d4a853;padding:5px 10px;
  background:rgba(20,30,44,0.60);border-left:3px solid #d4a853;
  margin-bottom:8px;
}
.ss-stat-section-title.cyan{color:#7aaa8e;border-left-color:#7aaa8e;}
.ss-stat-section-title.blue{color:#5ba8c4;border-left-color:#5ba8c4;}

/* -- Skill tier badge -- */
.ss-tier-badge{
  display:inline-block;padding:2px 10px;border:1px solid;border-radius:2px;
  font-size:10px;font-weight:700;letter-spacing:0.1em;margin-bottom:8px;
}

/* -- Build profile bars -- */
.ss-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ss-bar-label{font-size:10px;color:#8a9070;text-transform:uppercase;letter-spacing:0.05em;width:60px;flex-shrink:0;}
.ss-bar-track{flex:1;height:12px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;}
.ss-bar-fill{height:100%;border-radius:1px;}

/* -- Active bonuses -- */
.ss-bonus-item{margin-bottom:10px;padding-left:10px;border-left:3px solid #148cb4;}
.ss-bonus-item.set{border-left-color:#643cb4;}
.ss-bonus-name{font-size:11px;font-weight:700;color:#f2ead8;margin-bottom:2px;}
.ss-bonus-stat{font-size:10px;color:#7aaa8e;}

/* -- Spec perks -- */
.ss-perk-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(212,168,83,0.08);}
.ss-perk-left{flex:1;min-width:0;}
.ss-perk-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.ss-perk-desc{font-size:9px;color:#8a9070;line-height:1.5;margin-bottom:3px;}
.ss-perk-val{font-size:10px;font-weight:700;}
.ss-perk-right{flex-shrink:0;margin-left:12px;text-align:right;}
.ss-perk-badge{
  display:inline-block;padding:2px 8px;font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;border:1px solid;border-radius:1px;
}
.ss-pip-row{display:flex;gap:3px;margin-top:4px;justify-content:flex-end;}
.ss-pip{width:14px;height:8px;border-radius:1px;}

/* -- SHD grid -- */
.ss-shd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.ss-shd-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(0,0,0,0.2);border-radius:1px;}
.ss-shd-row.active{background:rgba(212,168,83,0.10);border-left:2px solid #d4a853;}
.ss-shd-label{font-size:10px;color:#8a9070;}
.ss-shd-val{font-size:11px;font-weight:700;color:#f2ead8;font-family:'Share Tech Mono',monospace;}
.ss-shd-val.active{color:#d4a853;}

/* -- Footer -- */
.ss-footer{
  background:rgba(20,30,44,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(212,168,83,0.15);
  border-top:3px solid #d4a853;
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;
}
.ss-footer-left .title{font-size:16px;font-weight:700;color:#d4a853;letter-spacing:0.1em;}
.ss-footer-left .link{font-size:10px;color:#7aaa8e;margin-top:2px;}
.ss-footer-right{text-align:right;}
.ss-footer-right .credit{font-size:12px;font-weight:700;color:#f2ead8;}
.ss-footer-right .version{font-size:10px;color:#d4a853;margin-top:2px;}
</style>
</head>

<script>
// -- Helpers ------------------------------------------------------------------
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kv(label,val,valClass=''){return`<div class="ss-kv"><span class="ss-kv-label">${esc(label)}</span><span class="ss-kv-val ${valClass}">${esc(val)}</span></div>`;}
function subhdr(label,color=''){return`<div class="ss-subhdr" style="${color?'color:'+color+';border-left-color:'+color:''}">${esc(label)}</div>`;}
function divider(){return'<div class="ss-divider"></div>';}
function rarityClass(q){const m={'High-End':'rarity-high-end','Named':'rarity-named','Exotic':'rarity-exotic','Gear Set':'rarity-gear-set','Prototype':'rarity-prototype'};return m[q]||'';}
function rarityColor(q){const m={'High-End':'#148cb4','Named':'#d47814','Exotic':'#d47814','Gear Set':'#643cb4','Prototype':'#a855f7'};return m[q]||'#d4a853';}

const D = window.__buildData;
if(!D){document.getElementById('page').innerHTML='<div style="color:red;padding:40px">No build data received</div>';throw new Error('no data');}

const {buildState,stats,dpsResults,DB,SKILLS_DB,SKILL_STAT_LABELS,SKILL_TIER_MULT,SPECIALIZATIONS_DB,SHD_STAT_IDS,version} = D;

</div>`;
