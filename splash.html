<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080c10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .emblem {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 12px #f4a21e66); }
      50%       { filter: drop-shadow(0 0 24px #f4a21eaa); }
    }

    .emblem img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #f4a21e;
      text-shadow: 0 0 30px #f4a21e66;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #4a6070;
      margin-bottom: 32px;
    }

    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #f4a21e88, transparent);
      margin-bottom: 32px;
    }

    .author {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #b8cfe0;
      margin-bottom: 8px;
    }

    .clan {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4a6070;
    }

    .loading-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #f4a21e, #00e5ff);
      animation: load 2.2s ease forwards;
      width: 0%;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="emblem">
    <img src="icon.png" alt="Division 2 Gear Calculator" />
  </div>

  <div class="title">Division 2</div>
  <div class="subtitle">Gear &amp; DPS Calculator v1.7.7</div>

  <div class="divider"></div>

  <div class="author">ImThatTeriyaki</div>
  <div class="clan">Sleepy Inc Clan</div>
  <div class="clan" style="margin-top:10px;">
    <a href="https://github.com/ImThatTeriyaki/Tom-Clancy-The-Division-2-Gear-calculator"
       style="color:#00e5ff;text-decoration:none;letter-spacing:0.15em;font-size:0.72rem;opacity:0.7;"
       title="GitHub">@ImThatTeriyaki — GitHub</a>
  </div>

  <div class="loading-bar"></div>
</body>
</html>
